<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Sign-On | Equinim College</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Roboto", sans-serif; }
    h1, h2, h3, .serif { font-family: "Playfair Display", serif; }
    .bg-eqc-green { background-color: #1a7a54; }
    .text-eqc-green { color: #1a7a54; }
    .border-eqc-green { border-color: #1a7a54; }
    .ring-eqc-green { --tw-ring-color: #1a7a54; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-4">
      <img src="/images/eqc-logo.png" alt="EQC Institute" class="h-12 w-auto object-contain" onerror="this.onerror=null; this.src='https://equinimcollege.com/wp-content/uploads/2021/08/EQC-Logo-1.png';" />
      <div class="h-8 w-px bg-gray-300"></div>
      <h1 class="text-xl font-bold text-gray-800 serif">Trainer Sign-On Portal</h1>
    </div>
    <span class="text-sm text-gray-500 font-medium" id="current-date"></span>
  </header>

  <main class="flex-1 flex flex-col items-center justify-start p-6 w-full max-w-2xl mx-auto">
    <!-- Success Message -->
    <div id="success-message" class="hidden w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 p-12 text-center">
      <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h2 class="text-2xl font-bold serif text-gray-800 mb-2">You're Signed On!</h2>
      <p class="text-gray-500 mb-2">The room allocation board has been updated.</p>
      <p class="text-sm text-gray-400 mb-8" id="success-details"></p>
      <button onclick="resetForm()" class="bg-eqc-green text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-opacity">Sign On Another Trainer</button>
    </div>

    <!-- Sign-On Form -->
    <div id="form-container" class="w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
      <div class="bg-eqc-green text-white p-5 text-center">
        <h2 class="text-lg font-bold serif">Please complete the form below to sign on</h2>
        <p class="text-sm opacity-90">Your sign-on will update the room allocation board automatically.</p>
      </div>

      <form id="signon-form" class="p-8 space-y-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Your Name *</label>
          <input type="text" name="name" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 ring-eqc-green focus:border-transparent outline-none transition-shadow" placeholder="e.g. Sarah Johnson" />
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Room *</label>
          <select name="room" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 ring-eqc-green focus:border-transparent outline-none transition-shadow" onchange="handleRoomChange(this)">
            <option value="">Select a room...</option>
            <option value="Room 1">Room 1</option>
            <option value="Room 2">Room 2</option>
            <option value="Room 3">Room 3</option>
            <option value="Room 4">Room 4</option>
            <option value="Room 5">Room 5</option>
            <option value="Room 6">Room 6</option>
            <option value="other">Other (specify)</option>
          </select>
          <input type="text" name="customRoom" id="custom-room" class="hidden w-full p-3 border border-gray-200 rounded-xl mt-2 focus:ring-2 ring-eqc-green focus:border-transparent outline-none" placeholder="Enter room name" />
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Course *</label>
          <select name="course" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 ring-eqc-green focus:border-transparent outline-none transition-shadow" onchange="handleCourseChange(this)">
            <option value="">Select a course...</option>
            <option value="Cyber Security">Cyber Security</option>
            <option value="Back End Web Dev">Back End Web Dev</option>
            <option value="other">Other (specify)</option>
          </select>
          <input type="text" name="customCourse" id="custom-course" class="hidden w-full p-3 border border-gray-200 rounded-xl mt-2 focus:ring-2 ring-eqc-green focus:border-transparent outline-none" placeholder="Enter course name" />
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Intake *</label>
          <input type="text" name="intake" required class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 ring-eqc-green focus:border-transparent outline-none transition-shadow" placeholder="e.g. Jan 2026" />
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 mb-2">Today's Topic</label>
          <input type="text" name="topics" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 ring-eqc-green focus:border-transparent outline-none transition-shadow" placeholder="e.g. Marketing Fundamentals" />
        </div>

        <div id="form-error" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm font-bold border border-red-100"></div>

        <button type="submit" id="submit-btn" class="w-full bg-eqc-green text-white py-4 rounded-xl font-bold text-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
          Sign On & Update Board
        </button>
      </form>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
    import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

    const app = initializeApp({
      apiKey: "AIzaSyAFB1f3hrr1nPtH_DDG6fkAq_VhkjDUBP4",
      authDomain: "eqc-dashboard-by-25g.firebaseapp.com",
      projectId: "eqc-dashboard-by-25g",
      storageBucket: "eqc-dashboard-by-25g.firebasestorage.app",
      messagingSenderId: "53462073983",
      appId: "1:53462073983:web:865a9336b39e3d4ec7f54a"
    });
    const db = getFirestore(app);

    document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    window.handleRoomChange = function(select) {
      document.getElementById('custom-room').classList.toggle('hidden', select.value !== 'other');
    };

    window.handleCourseChange = function(select) {
      document.getElementById('custom-course').classList.toggle('hidden', select.value !== 'other');
    };

    document.getElementById('signon-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const errorEl = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');

      const roomSelect = form.querySelector('[name="room"]');
      const courseSelect = form.querySelector('[name="course"]');
      const room = roomSelect.value === 'other' ? formData.get('customRoom') : roomSelect.value;
      const course = courseSelect.value === 'other' ? formData.get('customCourse') : courseSelect.value;

      if (!room || !course) {
        errorEl.textContent = 'Please fill in all required fields.';
        errorEl.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing on...';
      errorEl.classList.add('hidden');

      try {
        const payload = {
          name: formData.get('name'),
          room: room,
          course: course,
          intake: formData.get('intake'),
          topics: formData.get('topics') || 'Class in session'
        };

        const staffId = Date.now();
        await setDoc(doc(db, 'staff', 'staff_' + staffId), {
          name: payload.name,
          room: room,
          course: course,
          intake: payload.intake || '',
          topics: payload.topics,
          id: String(staffId),
          timestamp: new Date().toISOString()
        });

        const roomNum = parseInt(room.replace('Room ', ''));
        const roomId = (!isNaN(roomNum) && roomNum >= 1 && roomNum <= 6) ? roomNum : staffId;
        await setDoc(doc(db, 'rooms', 'room_' + roomId), {
          id: roomId,
          roomName: room,
          status: 'live',
          course: course,
          trainer: payload.name,
          intake: payload.intake || '',
          topic: payload.topics
        });

        document.getElementById('success-details').textContent = payload.name + ' - ' + room + ' - ' + course;
        document.getElementById('form-container').classList.add('hidden');
        document.getElementById('success-message').classList.remove('hidden');
      } catch (err) {
        errorEl.textContent = 'Failed to sign on. Please try again or contact admin.';
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign On & Update Board';
      }
    });

    window.resetForm = function() {
      document.getElementById('form-container').classList.remove('hidden');
      document.getElementById('success-message').classList.add('hidden');
      document.getElementById('signon-form').reset();
      document.getElementById('custom-room').classList.add('hidden');
      document.getElementById('custom-course').classList.add('hidden');
    };
  </script>
</body>
</html>
